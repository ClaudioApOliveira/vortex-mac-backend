quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:mec;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
quarkus.hibernate-orm.database.generation=none
quarkus.devservices.enabled=false

mp.jwt.verify.issuer=https://vortex.com/oficina
mp.jwt.verify.publickey.location=classpath:keys/publicKey.pem
smallrye.jwt.sign.key.location=classpath:keys/privateKey.pem

vortex.jwt.access-token.lifespan=900
vortex.jwt.refresh-token.lifespan=604800

quarkus.security.jaxrs.deny-unannotated-endpoints=true
quarkus.http.auth.permission.public.paths=/api/auth/login,/api/auth/refresh,/api/auth/verificar-primeiro-acesso,/api/auth/primeiro-acesso,/api/localidades/estados/*,/q/*
quarkus.http.auth.permission.public.policy=permit

%test.vortex.request-timing.enabled=true
%test.vortex.rate-limit.enabled=false
