quarkus.application.name=mec-backend

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/mec

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

quarkus.devservices.enabled=false

quarkus.http.port=8080

# OpenAPI / Swagger (habilitado apenas no perfil dev)
quarkus.swagger-ui.always-include=false
%dev.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173,http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,origin,x-requested-with,x-csrf-token
quarkus.http.cors.exposed-headers=authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=PT24H

# JWT
mp.jwt.verify.issuer=https://vortex.com/oficina
mp.jwt.verify.publickey.location=classpath:keys/publicKey.pem
smallrye.jwt.sign.key.location=classpath:keys/privateKey.pem

vortex.jwt.access-token.lifespan=900
vortex.jwt.refresh-token.lifespan=604800

# Cookies de autenticação
vortex.auth.refresh-token.cookie-name=refresh_token
vortex.auth.cookie.path=/api/auth
vortex.auth.cookie.secure=false
vortex.auth.cookie.same-site=Lax

# Valkey (Redis)
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# OpenCEP
quarkus.rest-client.opencep-api.url=https://opencep.com

# Segurança
quarkus.security.jaxrs.deny-unannotated-endpoints=true
quarkus.http.auth.permission.public.paths=/api/auth/login,/api/auth/refresh,/api/auth/verificar-primeiro-acesso,/api/auth/primeiro-acesso,/api/localidades/estados/*,/q/*
quarkus.http.auth.permission.public.policy=permit

# Request timing
vortex.request-timing.enabled=true

# Rate limit
vortex.rate-limit.enabled=true
vortex.rate-limit.trust-proxy=false
vortex.rate-limit.auth-requests=10
vortex.rate-limit.auth-email-requests=5
vortex.rate-limit.auth-window-seconds=60
vortex.rate-limit.api-requests=200
vortex.rate-limit.api-window-seconds=60

# CSRF (double-submit cookie para rotas com refresh_token em cookie)
vortex.auth.csrf.enabled=true
# Legível pelo JS na SPA (Path=/); refresh_token permanece em /api/auth (HttpOnly)
vortex.auth.csrf.cookie-path=/

# Limpeza de refresh tokens expirados/revogados
vortex.jwt.refresh-token.cleanup-cron=0 0 3 * * ?
