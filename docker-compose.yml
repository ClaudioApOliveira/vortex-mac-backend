services:
  postgres:
    image: postgres:16-alpine
    container_name: mec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mec_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/seeds/municipios.sql:/docker-entrypoint-initdb.d/02-municipios.sql
      - ./docker/postgres/seeds/dev-admin.sql:/docker-entrypoint-initdb.d/99-dev-admin.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mec"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: mec-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mec_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mec_pg_data:
  mec_valkey_data:
