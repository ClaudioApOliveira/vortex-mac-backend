name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-native-build:
    name: Testes e build nativo
    runs-on: self-hosted
    environment: DOCKERHUB

    env:
      MAVEN_OPTS: -Xmx1536m
      QUARKUS_PROFILE: prod
      DOCKER_IMAGE: oliveiraclaudio/vortex-mec-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Preparar e testar
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/gerar-chaves-jwt.sh
          ./scripts/gerar-chaves-jwt.sh
          ./mvnw test -DskipITs --batch-mode

      - name: Build nativo
        shell: bash
        run: |
          set -euo pipefail

          MEM_AVAILABLE_MB=$(awk '/MemAvailable:/ {print int($2 / 1024)}' /proc/meminfo)
          SWAP_FREE_MB=$(free -m | awk '/^Swap:/ {print ($2 > 0) ? $4 : 0}')
          CPU_THREADS=$(nproc)

          USABLE_MB=$((MEM_AVAILABLE_MB + SWAP_FREE_MB))
          MAVEN_MB=512
          OS_BUFFER_MB=256
          NATIVE_MB=$((USABLE_MB - MAVEN_MB - OS_BUFFER_MB))

          if [ "$NATIVE_MB" -lt 1024 ]; then
            echo "Erro: memória insuficiente para build nativo (disponível: ${USABLE_MB}MB, mínimo: ~1792MB)."
            free -h
            exit 1
          fi

          export MAVEN_OPTS="-Xmx${MAVEN_MB}m"

          echo "Memória: ${USABLE_MB}MB utilizável → native-image ${NATIVE_MB}MB, ${CPU_THREADS} threads"
          free -h

          ./mvnw package -Dnative -DskipTests --batch-mode \
            -Dquarkus.native.native-image-xmx="${NATIVE_MB}m" \
            -Dquarkus.native.additional-build-args=-H:NumberOfThreads="${CPU_THREADS}"

          BINARY="target/mec-backend-1.0.0-SNAPSHOT-runner"
          test -f "$BINARY"
          chmod +x "$BINARY"
          ls -lh "$BINARY"

      - name: Build imagem Docker
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f src/main/docker/Dockerfile.native-micro \
            -t "${DOCKER_IMAGE}:${GITHUB_SHA}" \
            -t "${DOCKER_IMAGE}:latest" \
            .

      - name: Scan da imagem (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

      - name: Push imagem Docker Hub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker push "${DOCKER_IMAGE}:${GITHUB_SHA}"
          docker push "${DOCKER_IMAGE}:latest"
